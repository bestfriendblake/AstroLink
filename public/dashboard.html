<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AstroLink — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka+One&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/og/dashboard.css" />
</head>
<body>

  <!-- Top Bar -->
  <div class="topbar">
    <span class="topbar-logo">AstroLink</span>
    <div class="topbar-right">
      <div class="currency-pill">
        <div class="star-icon"></div>
        <span id="stardust-balance">0</span>
      </div>
      <button class="avatar-btn" id="avatar-btn" title="Profile settings"></button>
    </div>
  </div>

  <!-- Profile Banner -->
  <div class="profile-banner">
    <div class="profile-avatar" id="profile-avatar"></div>
    <div class="profile-info">
      <p class="profile-name" id="profile-name">...</p>
      <p class="profile-level" id="profile-level">Global Level 1 · Moon Explorer</p>
      <div class="xp-bar-bg">
        <div class="xp-bar-fill" id="xp-bar"></div>
      </div>
    </div>
  </div>

  <!-- Pets -->
  <div class="section-label">My Pets</div>
  <div class="pet-preview" id="pet-preview">
    <div class="pet-chip loading-chip">Loading...</div>
  </div>

  <!-- Explore -->
  <div class="section-label">Explore</div>
  <div class="grid-2">
    <div class="nav-card" onclick="goTo('starmap.html')">
      <div class="card-icon icon-blue">🪐</div>
      <div>
        <div class="card-title">Star Map</div>
        <div class="card-sub">Travel to planets</div>
      </div>
    </div>
    <div class="nav-card" onclick="goTo('moon.html')">
      <div class="card-icon icon-pink">🌙</div>
      <div>
        <div class="card-title">The Moon</div>
        <div class="card-sub">Current location</div>
      </div>
    </div>
  </div>

  <!-- Shop & Trade -->
  <div class="section-label">Shop &amp; Trade</div>
  <div class="grid-2">
    <div class="nav-card" onclick="goTo('shop.html')">
      <div class="card-icon icon-amber">🛍️</div>
      <div>
        <div class="card-title">Item Shop</div>
        <div class="card-sub">Spend stardust</div>
      </div>
    </div>
    <div class="nav-card" onclick="goTo('auction.html')">
      <div class="card-icon icon-mint">🏷️</div>
      <div>
        <div class="card-title">Auction House</div>
        <div class="card-sub">Buy &amp; sell pets</div>
      </div>
    </div>
  </div>

  <!-- Community -->
  <div class="section-label">Community</div>
  <div class="grid-2">
    <div class="nav-card" onclick="goTo('starbook.html')">
      <div class="card-icon icon-coral">🌟</div>
      <div>
        <div class="card-title">Starbook</div>
        <div class="card-sub">Player profiles</div>
      </div>
    </div>
    <div class="nav-card" onclick="goTo('settings.html')">
      <div class="card-icon icon-purple">⚙️</div>
      <div>
        <div class="card-title">Settings</div>
        <div class="card-sub">Profile &amp; account</div>
      </div>
    </div>
  </div>

  <script src="js/dashboard.js"></script>
</body>
</html>
